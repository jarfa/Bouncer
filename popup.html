<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Bouncer</h1>

  <section id="pause-section">
    <div id="pause-default">
      <button id="pause-1" class="pause-btn">Pause 1 min</button>
      <button id="pause-5" class="pause-btn">Pause 5 min</button>
    </div>
    <div id="pause-active" hidden>
      <p id="pause-status">Paused — 0:00 remaining</p>
      <div class="pause-controls">
        <button id="extend-1" class="pause-btn small">+1 min</button>
        <button id="extend-5" class="pause-btn small">+5 min</button>
        <button id="resume-btn" class="pause-btn resume">Resume</button>
      </div>
    </div>
  </section>

  <section>
    <h2>Blocked Domains</h2>
    <ul id="blocked-list"></ul>
    <form id="blocked-form">
      <input type="text" id="blocked-input" placeholder="example.com" required>
      <button type="submit">Add</button>
    </form>
    <p class="form-error" id="blocked-error" hidden></p>
  </section>

  <section>
    <h2>Allowed Paths</h2>
    <ul id="allowed-list"></ul>
    <form id="allowed-form">
      <input type="text" id="allowed-input" placeholder="reddit.com/r/austin" required>
      <button type="submit">Add</button>
    </form>
    <p class="form-error" id="allowed-error" hidden></p>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
